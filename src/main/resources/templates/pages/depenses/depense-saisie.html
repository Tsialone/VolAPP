<section class="section" th:fragment="page">
    <div class="card">
        <div class="card-header">
            <h4 class="card-title">Saisie de depense</h4>
        </div>

        <div class="card-body">
            <hr />
            <form th:action="@{/depense/saisie}" method="post" class="mb-4">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label for="dateDebut" class="form-label">Date</label>
                        <input type="datetime-local" class="form-control" id="dateDebut" name="dateDebut"
                            th:value="${param.dateDebut}">

                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="flexSwitchCheckDefault">
                            <label class="form-check-label" for="flexSwitchCheckDefault">Prevue</label>
                        </div>
                    </div>



                    <div class="col-md-4">
                        <label for="heure" class="form-label">Heure</label>
                        <input type="time" class="form-control" id="heure" name="heure" th:value="${param.heure}">
                    </div>

                    <div class="col-md-4 d-flex align-items-end">
                        <button type="submit" class="btn btn-primary w-25">
                            Valider
                        </button>
                        <a th:href="@{/salles/liste}" class="btn btn-secondary ms-1">
                            <i class="bi bi-arrow-clockwise"></i> Réinitialiser
                        </a>
                    </div>
                </div>
            </form>

        </div>
    </div>
</section>
