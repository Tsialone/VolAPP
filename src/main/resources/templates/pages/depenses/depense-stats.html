<section class="section" th:fragment="page">
    <div class="card">
        <div class="card-header">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 stats-header-tools">
                <h4 class="card-title mb-0">Statistiques des dépenses</h4>
                <div class="d-flex align-items-center gap-2 stats-period-wrap">
                    <label for="periodeSelect" class="mb-0 text-muted small">Période</label>
                    <select id="periodeSelect" class="form-select form-select-sm" style="min-width: 200px;">
                        <option value="journaliere">Journalière</option>
                        <option value="hebdomadaire">Hebdomadaire</option>
                        <option value="mensuelle" selected>Mensuelle</option>
                        <option value="annuelle">Annuelle</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="card-body">
            <div class="row g-3 mb-4">
                <div class="col-md-4">
                    <div class="border rounded p-3 h-100 bg-light-subtle">
                        <p class="text-muted mb-1">Dépense moyenne par période</p>
                        <h3 class="mb-0 text-primary" id="moyenneValue">0,00 Ar</h3>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="border rounded p-3 h-100 bg-light-subtle">
                        <p class="text-muted mb-1">Période avec moyenne max</p>
                        <h5 class="mb-0" id="maxPeriodeLabel">-</h5>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="border rounded p-3 h-100 bg-light-subtle">
                        <p class="text-muted mb-1">Valeur max</p>
                        <h5 class="mb-0 text-success" id="maxPeriodeValue">0,00 Ar</h5>
                    </div>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-striped align-middle">
                    <thead>
                        <tr>
                            <th>Label</th>
                            <th class="text-end">Dépense moyenne</th>
                        </tr>
                    </thead>
                    <tbody id="statsBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="card mt-3">
        <div class="card-header">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 stats-header-tools">
                <h4 class="card-title mb-0">Courbe des dépenses par catégorie</h4>
            </div>
        </div>
        <div class="card-body">
            <div class="d-flex flex-wrap gap-3 mb-3" id="courbeLegend"></div>
            <div class="border rounded p-2 chart-scroll-wrap">
                <svg id="categorieCourbeSvg" class="chart-svg" viewBox="0 0 920 340" width="100%" height="340" role="img" aria-label="Courbe des dépenses par catégorie"></svg>
            </div>
        </div>
    </div>

    <div class="card mt-3">
        <div class="card-header">
            <h4 class="card-title mb-0">Nombre de dépenses</h4>
        </div>
        <div class="card-body">
            <div class="row g-3">
                <div class="col-12 col-lg-6">
                    <h6 class="mb-2">nbrDepenseParCategorie</h6>
                    <div class="border rounded p-2 chart-scroll-wrap">
                        <svg id="nbrCategorieSvg" class="bar-chart-svg" viewBox="0 0 560 300" width="100%" height="300" role="img" aria-label="Barres nombre de dépenses par catégorie"></svg>
                    </div>
                </div>
                <div class="col-12 col-lg-6">
                    <h6 class="mb-2">nbrDepenseParSousCategorie</h6>
                    <div class="border rounded p-2 chart-scroll-wrap">
                        <svg id="nbrSousCategorieSvg" class="bar-chart-svg" viewBox="0 0 560 300" width="100%" height="300" role="img" aria-label="Barres nombre de dépenses par sous-catégorie"></svg>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <style>
        .chart-scroll-wrap {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .chart-svg {
            min-width: 920px;
        }

        .bar-chart-svg {
            min-width: 560px;
        }

        @media (max-width: 768px) {
            .stats-header-tools {
                align-items: stretch !important;
            }

            .stats-period-wrap {
                width: 100%;
                justify-content: space-between;
            }

            .stats-period-wrap .form-select {
                min-width: 0 !important;
                width: 100%;
            }

            #courbeLegend {
                gap: 0.5rem !important;
            }

            #courbeLegend small {
                font-size: 0.75rem;
            }
        }
    </style>

    <script>
        const depenseStatsFallbackData = {
            journaliere: [
                { label: 'Lundi', moyenne: 45000.25 },
                { label: 'Mardi', moyenne: 39000.5 },
                { label: 'Mercredi', moyenne: 52000.0 },
                { label: 'Jeudi', moyenne: 48000.75 },
                { label: 'Vendredi', moyenne: 61000.1 },
                { label: 'Samedi', moyenne: 55000.0 },
                { label: 'Dimanche', moyenne: 30000.4 }
            ],
            hebdomadaire: [
                { label: '01/03 - 07/03', moyenne: 310000.0 },
                { label: '08/03 - 14/03', moyenne: 285000.35 },
                { label: '15/03 - 21/03', moyenne: 325000.0 },
                { label: '22/03 - 28/03', moyenne: 298000.85 }
            ],
            mensuelle: [
                { label: 'Janvier', moyenne: 1200000.0 },
                { label: 'Février', moyenne: 1155000.75 },
                { label: 'Mars', moyenne: 1290000.4 },
                { label: 'Avril', moyenne: 1215000.0 },
                { label: 'Mai', moyenne: 1330000.6 },
                { label: 'Juin', moyenne: 1260000.0 }
            ],
            annuelle: [
                { label: '2022', moyenne: 12800000.0 },
                { label: '2023', moyenne: 13550000.5 },
                { label: '2024', moyenne: 14900000.0 },
                { label: '2025', moyenne: 15350000.25 }
            ]
        };

        const depenseCategorieCourbeData = {
            journaliere: {
                labels: ['Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam', 'Dim'],
                series: [
                    { name: 'Transport', values: [12000, 14000, 13000, 15000, 17000, 11000, 9000] },
                    { name: 'Fournitures', values: [9000, 8000, 9500, 10000, 12000, 7000, 6000] },
                    { name: 'Maintenance', values: [7000, 6000, 8000, 7500, 9000, 5000, 4500] }
                ]
            },
            hebdomadaire: {
                labels: ['01/03-07/03', '08/03-14/03', '15/03-21/03', '22/03-28/03'],
                series: [
                    { name: 'Transport', values: [95000, 102000, 98000, 105000] },
                    { name: 'Fournitures', values: [64000, 58000, 70000, 62000] },
                    { name: 'Maintenance', values: [42000, 39000, 45000, 41000] }
                ]
            },
            mensuelle: {
                labels: ['Jan', 'Fév', 'Mar', 'Avr', 'Mai', 'Juin'],
                series: [
                    { name: 'Transport', values: [410000, 390000, 450000, 430000, 470000, 455000] },
                    { name: 'Fournitures', values: [280000, 265000, 300000, 290000, 320000, 310000] },
                    { name: 'Maintenance', values: [190000, 175000, 210000, 205000, 225000, 215000] }
                ]
            },
            annuelle: {
                labels: ['2022', '2023', '2024', '2025'],
                series: [
                    { name: 'Transport', values: [4500000, 5100000, 5800000, 6100000] },
                    { name: 'Fournitures', values: [3200000, 3500000, 3900000, 4200000] },
                    { name: 'Maintenance', values: [2100000, 2400000, 2700000, 3000000] }
                ]
            }
        };

        const depenseNombreData = {
            journaliere: {
                categories: [
                    { label: 'Transport', value: 12 },
                    { label: 'Fournitures', value: 9 },
                    { label: 'Maintenance', value: 7 }
                ],
                sousCategories: [
                    { label: 'Carburant', value: 5 },
                    { label: 'Taxi', value: 4 },
                    { label: 'Papeterie', value: 6 },
                    { label: 'Réparation', value: 3 }
                ]
            },
            hebdomadaire: {
                categories: [
                    { label: 'Transport', value: 38 },
                    { label: 'Fournitures', value: 31 },
                    { label: 'Maintenance', value: 22 }
                ],
                sousCategories: [
                    { label: 'Carburant', value: 14 },
                    { label: 'Taxi', value: 11 },
                    { label: 'Papeterie', value: 18 },
                    { label: 'Réparation', value: 9 }
                ]
            },
            mensuelle: {
                categories: [
                    { label: 'Transport', value: 145 },
                    { label: 'Fournitures', value: 122 },
                    { label: 'Maintenance', value: 88 }
                ],
                sousCategories: [
                    { label: 'Carburant', value: 52 },
                    { label: 'Taxi', value: 43 },
                    { label: 'Papeterie', value: 71 },
                    { label: 'Réparation', value: 36 }
                ]
            },
            annuelle: {
                categories: [
                    { label: 'Transport', value: 1760 },
                    { label: 'Fournitures', value: 1430 },
                    { label: 'Maintenance', value: 980 }
                ],
                sousCategories: [
                    { label: 'Carburant', value: 640 },
                    { label: 'Taxi', value: 510 },
                    { label: 'Papeterie', value: 820 },
                    { label: 'Réparation', value: 390 }
                ]
            }
        };

        function formatMontant(value) {
            const arrondi = Number(value || 0).toFixed(2);
            const [entier, decimal] = arrondi.split('.');
            const entierFormate = entier.replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
            return `${entierFormate},${decimal} Ar`;
        }

        function renderStatsFromData(data, moyenneGlobale, maxLabel, maxValue) {
            const tbody = document.getElementById('statsBody');
            const moyenneValue = document.getElementById('moyenneValue');
            const maxPeriodeLabel = document.getElementById('maxPeriodeLabel');
            const maxPeriodeValue = document.getElementById('maxPeriodeValue');

            tbody.innerHTML = '';

            if (data.length === 0) {
                moyenneValue.textContent = '0,00 Ar';
                maxPeriodeLabel.textContent = '-';
                maxPeriodeValue.textContent = '0,00 Ar';
                return;
            }

            data.forEach(item => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${item.label}</td>
                    <td class="text-end fw-semibold">${formatMontant(item.depenseMoyenne ?? item.moyenne ?? 0)}</td>
                `;
                tbody.appendChild(tr);
            });

            moyenneValue.textContent = formatMontant(moyenneGlobale || 0);
            maxPeriodeLabel.textContent = maxLabel || '-';
            maxPeriodeValue.textContent = formatMontant(maxValue || 0);
        }

        async function renderStats(periodeKey) {
            const tbody = document.getElementById('statsBody');
            tbody.innerHTML = `<tr><td colspan="2" class="text-center text-muted">Chargement...</td></tr>`;

            try {
                const response = await fetch(`/api/depenses/stats/recap?periode=${encodeURIComponent(periodeKey)}`);
                if (!response.ok) {
                    throw new Error('Erreur API recap');
                }

                const payload = await response.json();
                const data = payload.depenseMoyenneParPeriode || [];

                renderStatsFromData(
                    data,
                    payload.moyenneGlobale,
                    payload.maxLabel,
                    payload.maxValue
                );
            } catch (e) {
                const fallbackData = (depenseStatsFallbackData[periodeKey] || []).map(item => ({
                    label: item.label,
                    depenseMoyenne: Number(item.moyenne || 0)
                }));

                const somme = fallbackData.reduce((acc, item) => acc + Number(item.depenseMoyenne || 0), 0);
                const moyenneGlobale = fallbackData.length > 0 ? somme / fallbackData.length : 0;
                const maxItem = fallbackData.length > 0
                    ? fallbackData.reduce((max, item) => item.depenseMoyenne > max.depenseMoyenne ? item : max, fallbackData[0])
                    : { label: '-', depenseMoyenne: 0 };

                renderStatsFromData(fallbackData, moyenneGlobale, maxItem.label, maxItem.depenseMoyenne);
            }
        }

        function renderCourbeCategorie(periodeKey) {
            const cfg = depenseCategorieCourbeData[periodeKey];
            const svg = document.getElementById('categorieCourbeSvg');
            const legend = document.getElementById('courbeLegend');

            if (!cfg || !cfg.labels || !cfg.series) {
                svg.innerHTML = '';
                legend.innerHTML = '';
                return;
            }

            const colors = ['#435ebe', '#198754', '#dc3545', '#fd7e14', '#6f42c1'];
            const width = 920;
            const height = 340;
            const padLeft = 60;
            const padRight = 20;
            const padTop = 20;
            const padBottom = 50;
            const chartW = width - padLeft - padRight;
            const chartH = height - padTop - padBottom;
            const maxVal = Math.max(...cfg.series.flatMap(s => s.values), 1);
            const stepsY = 5;

            svg.innerHTML = '';
            legend.innerHTML = '';

            for (let i = 0; i <= stepsY; i++) {
                const y = padTop + (chartH / stepsY) * i;
                const value = maxVal - (maxVal / stepsY) * i;

                const grid = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                grid.setAttribute('x1', padLeft);
                grid.setAttribute('x2', padLeft + chartW);
                grid.setAttribute('y1', y);
                grid.setAttribute('y2', y);
                grid.setAttribute('stroke', '#e9ecef');
                grid.setAttribute('stroke-width', '1');
                svg.appendChild(grid);

                const labelY = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                labelY.setAttribute('x', String(padLeft - 8));
                labelY.setAttribute('y', String(y + 4));
                labelY.setAttribute('text-anchor', 'end');
                labelY.setAttribute('font-size', '11');
                labelY.setAttribute('fill', '#6c757d');
                labelY.textContent = formatMontant(value).replace(' Ar', '');
                svg.appendChild(labelY);
            }

            const axisX = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            axisX.setAttribute('x1', padLeft);
            axisX.setAttribute('x2', padLeft + chartW);
            axisX.setAttribute('y1', padTop + chartH);
            axisX.setAttribute('y2', padTop + chartH);
            axisX.setAttribute('stroke', '#adb5bd');
            svg.appendChild(axisX);

            const axisY = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            axisY.setAttribute('x1', padLeft);
            axisY.setAttribute('x2', padLeft);
            axisY.setAttribute('y1', padTop);
            axisY.setAttribute('y2', padTop + chartH);
            axisY.setAttribute('stroke', '#adb5bd');
            svg.appendChild(axisY);

            cfg.labels.forEach((label, idx) => {
                const x = padLeft + (chartW * idx) / Math.max(cfg.labels.length - 1, 1);
                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.setAttribute('x', String(x));
                text.setAttribute('y', String(padTop + chartH + 20));
                text.setAttribute('text-anchor', 'middle');
                text.setAttribute('font-size', '11');
                text.setAttribute('fill', '#6c757d');
                text.textContent = label;
                svg.appendChild(text);
            });

            cfg.series.forEach((serie, sIdx) => {
                const color = colors[sIdx % colors.length];
                const points = serie.values.map((value, idx) => {
                    const x = padLeft + (chartW * idx) / Math.max(cfg.labels.length - 1, 1);
                    const y = padTop + chartH - (value / maxVal) * chartH;
                    return { x, y, value };
                });

                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('d', points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x} ${p.y}`).join(' '));
                path.setAttribute('fill', 'none');
                path.setAttribute('stroke', color);
                path.setAttribute('stroke-width', '2.5');
                svg.appendChild(path);

                points.forEach(point => {
                    const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                    dot.setAttribute('cx', String(point.x));
                    dot.setAttribute('cy', String(point.y));
                    dot.setAttribute('r', '3');
                    dot.setAttribute('fill', color);
                    svg.appendChild(dot);
                });

                const legendItem = document.createElement('div');
                legendItem.className = 'd-flex align-items-center gap-2';
                legendItem.innerHTML = `
                    <span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:${color};"></span>
                    <small class="text-muted">${serie.name}</small>
                `;
                legend.appendChild(legendItem);
            });
        }

        function renderBarChart(svgId, data, color) {
            const svg = document.getElementById(svgId);
            if (!svg) return;

            const items = data || [];
            const width = 560;
            const height = 300;
            const padLeft = 40;
            const padRight = 16;
            const padTop = 16;
            const padBottom = 70;
            const chartW = width - padLeft - padRight;
            const chartH = height - padTop - padBottom;
            const maxVal = Math.max(...items.map(i => Number(i.value || 0)), 1);

            svg.innerHTML = '';

            const axisX = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            axisX.setAttribute('x1', padLeft);
            axisX.setAttribute('x2', padLeft + chartW);
            axisX.setAttribute('y1', padTop + chartH);
            axisX.setAttribute('y2', padTop + chartH);
            axisX.setAttribute('stroke', '#adb5bd');
            svg.appendChild(axisX);

            const axisY = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            axisY.setAttribute('x1', padLeft);
            axisY.setAttribute('x2', padLeft);
            axisY.setAttribute('y1', padTop);
            axisY.setAttribute('y2', padTop + chartH);
            axisY.setAttribute('stroke', '#adb5bd');
            svg.appendChild(axisY);

            const gap = 14;
            const barW = Math.max((chartW - gap * (items.length + 1)) / Math.max(items.length, 1), 18);

            items.forEach((item, idx) => {
                const value = Number(item.value || 0);
                const barH = (value / maxVal) * chartH;
                const x = padLeft + gap + idx * (barW + gap);
                const y = padTop + chartH - barH;

                const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                rect.setAttribute('x', String(x));
                rect.setAttribute('y', String(y));
                rect.setAttribute('width', String(barW));
                rect.setAttribute('height', String(barH));
                rect.setAttribute('rx', '4');
                rect.setAttribute('fill', color);
                svg.appendChild(rect);

                const valText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                valText.setAttribute('x', String(x + barW / 2));
                valText.setAttribute('y', String(y - 6));
                valText.setAttribute('text-anchor', 'middle');
                valText.setAttribute('font-size', '11');
                valText.setAttribute('fill', '#495057');
                valText.textContent = String(value);
                svg.appendChild(valText);

                const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                label.setAttribute('x', String(x + barW / 2));
                label.setAttribute('y', String(padTop + chartH + 18));
                label.setAttribute('text-anchor', 'middle');
                label.setAttribute('font-size', '10');
                label.setAttribute('fill', '#6c757d');
                label.textContent = item.label;
                svg.appendChild(label);
            });
        }

        function renderNbrDepenses(periodeKey) {
            const cfg = depenseNombreData[periodeKey] || { categories: [], sousCategories: [] };
            renderBarChart('nbrCategorieSvg', cfg.categories, '#0d6efd');
            renderBarChart('nbrSousCategorieSvg', cfg.sousCategories, '#20c997');
        }

        window.addEventListener('DOMContentLoaded', () => {
            const select = document.getElementById('periodeSelect');

            renderStats(select.value);
            renderCourbeCategorie(select.value);
            renderNbrDepenses(select.value);

            select.addEventListener('change', (e) => {
                renderStats(e.target.value);
                renderCourbeCategorie(e.target.value);
                renderNbrDepenses(e.target.value);
            });
        });
    </script>
</section>
