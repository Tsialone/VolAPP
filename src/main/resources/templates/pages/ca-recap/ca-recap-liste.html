<section class="section" th:fragment="page">
    <div class="card">
        <div class="card-header">
            <h4 class="card-title">Récapitulatif Chiffre d'Affaires</h4>
        </div>

        <div class="card-body">
            <!-- Cartes de résumé -->
            <div class="row mb-4">
                <div class="col-lg-3 col-md-6 mb-3 mb-lg-0">
                    <div class="card border-primary h-100">
                        <div class="card-body">
                            <p class="text-muted mb-1">CA Tickets</p>
                            <h4 class="mb-0" th:text="${#numbers.formatDecimal(caRecap.totalCaTickets,1,'COMMA',2,'POINT')}">0.00</h4>
                        </div>
                    </div>
                </div>
                <div class="col-lg-3 col-md-6 mb-3 mb-lg-0">
                    <div class="card border-info h-100">
                        <div class="card-body">
                            <p class="text-muted mb-1">CA Publicités</p>
                            <h4 class="mb-0" th:text="${#numbers.formatDecimal(caRecap.totalCaPub,1,'COMMA',2,'POINT')}">0.00</h4>
                        </div>
                    </div>
                </div>
                <div class="col-lg-3 col-md-6 mb-3 mb-lg-0">
                    <div class="card border-success h-100">
                        <div class="card-body">
                            <p class="text-muted mb-1">CA Articles</p>
                            <h4 class="mb-0" th:text="${#numbers.formatDecimal(caRecap.totalCaArticle,1,'COMMA',2,'POINT')}">0.00</h4>
                        </div>
                    </div>
                </div>
                <div class="col-lg-3 col-md-6">
                    <div class="card border-warning h-100">
                        <div class="card-body">
                            <p class="text-muted mb-1">CA Global</p>
                            <h4 class="mb-0" th:text="${#numbers.formatDecimal(caRecap.totalCaGlobal,1,'COMMA',2,'POINT')}">0.00</h4>
                        </div>
                    </div>
                </div>
            </div>

            <hr/>

            <!-- Formulaire de filtre -->
            <form th:action="@{/ca-recap/liste}" method="get" class="mb-4">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label for="date" class="form-label">Date</label>
                        <input type="date" class="form-control" id="date" name="date" 
                               th:value="${dateFilter}">
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button type="submit" class="btn btn-primary w-100">Filtrer</button>
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <a th:href="@{/ca-recap/liste}" class="btn btn-secondary w-100">Réinitialiser</a>
                    </div>
                </div>
            </form>

            <div class="alert alert-info" role="alert">
                Chiffre d'affaires du <strong th:text="${dateFilter}"></strong>
            </div>
        </div>
    </div>
</section>
