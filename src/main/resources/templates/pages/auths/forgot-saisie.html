<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Mazer Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/assets/css/bootstrap.css}">
    <link rel="stylesheet" th:href="@{/assets/vendors/bootstrap-icons/bootstrap-icons.css}">
    <link rel="stylesheet" th:href="@{/assets/css/app.css}">
    <link rel="stylesheet" th:href="@{/assets/css/pages/auth.css}">
</head>

<body>
    <div id="auth">
        <div class="row h-100">
            <div class="col-lg-5 col-12">
                <div id="auth-left">
                    <h1 class="auth-title">Forgot Password</h1>
                    <p class="auth-subtitle mb-5">Saisissez votre nom d'utilisateur pour réinitialiser votre mot de passe.</p>

                    <!-- On change l'action vers /forgot-password -->
                    <form th:action="@{/forgot-password}" method="post">
                        <div class="form-group position-relative has-icon-left mb-4">
                            <input type="text" class="form-control form-control-xl" 
                                   placeholder="Nom d'utilisateur" name="username" required>
                            <div class="form-control-icon">
                                <i class="bi bi-person"></i>
                            </div>
                        </div>
                        <button class="btn btn-primary btn-block btn-lg shadow-lg mt-3">Envoyer le lien</button>
                    </form>
                    
                    <div class="text-center mt-5 text-lg fs-4">
                        <p class='text-gray-600'>Vous vous en souvenez ? 
                            <a th:href="@{/}" class="font-bold">Log in</a>.
                        </p>
                    </div>
                </div>
            </div>
            <div class="col-lg-7 d-none d-lg-block">
                <div id="auth-right" style="background-image: url('/assets/images/bg/finance.jpg'); 
                background-size: cover; background-position: center; height: 100vh;">
                </div>
            </div>
        </div>
    </div>

    <!-- Toast pour les confirmations ou erreurs -->
    <div id="toastData" th:data-message="${toastMessage}" th:data-type="${toastType}" style="display:none"></div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        const toastDiv = document.getElementById('toastData');
        const msg = toastDiv.getAttribute('data-message');
        const type = toastDiv.getAttribute('data-type');
        if (msg && msg !== "null") {
            Swal.fire({
                toast: true, position: 'top-right', showConfirmButton: false,
                timer: 5000, timerProgressBar: true, icon: type, title: msg
            });
        }
    </script>
</body>
</html>
