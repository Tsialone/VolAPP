<section class="section" th:fragment="page">
    <div class="card">
        <div class="card-header">
            <h4 class="card-title">Nouvelle Vente Article</h4>
        </div>

        <div class="card-body">
            <!-- Messages de succès ou d'erreur -->
            <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
                <i class="bi bi-check-circle"></i> <span th:text="${successMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="bi bi-exclamation-triangle"></i> <span th:text="${errorMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <form th:action="@{/ventes/saisie}" method="post">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="idArticle" class="form-label">Article <span class="text-danger">*</span></label>
                        <select class="form-select" id="idArticle" name="idArticle" required>
                            <option value="">-- Sélectionner un article --</option>
                            <option th:each="article : ${articles}" 
                                    th:value="${article.idArticle}"
                                    th:text="${'Article ' + article.idArticle + ' - ' + #numbers.formatDecimal(article.pu,1,'COMMA',2,'POINT') + ' Ar'}">
                            </option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label for="nbrVente" class="form-label">Nombre de ventes <span class="text-danger">*</span></label>
                        <input type="number" class="form-control" id="nbrVente" name="nbrVente" 
                               required min="1" value="1"
                               placeholder="Nombre de ventes à enregistrer">
                    </div>
                </div>

                <div class="row mt-4">
                    <div class="col-12">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-circle"></i> Enregistrer
                        </button>
                        <a th:href="@{/}" class="btn btn-secondary">
                            <i class="bi bi-x-circle"></i> Annuler
                        </a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</section>
